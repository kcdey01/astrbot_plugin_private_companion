name: astrbot_plugin_private_companion
display_name: 我会永远陪着你
author: menglimi
description: astrbot_plugin_private_companion 是面向 AstrBot 私聊场景的主动陪伴插件。它会让 bot 拥有连续拟人状态、生活日程、重要日期、日记和低频主动消息,更像一个有自己生活节奏的私聊伙伴。
desc: 让 Bot 拥有连续状态、生活日程、长期事件与自然主动分享能力的私聊陪伴插件。
help: |
  私聊发送：
  - 陪伴 开启
  - 陪伴 关闭
  - 陪伴 状态
  - 陪伴 查询状态
  - 陪伴 刷新状态
  - 陪伴 查看主动判定
  - 陪伴 重置插件
  - 陪伴 增添状态 <状态描述>[|持续小时]
  - 陪伴 日程
  - 陪伴 生成日程
  - 陪伴 细化
  - 陪伴 拟人状态
  - 陪伴 生成状态
  - 陪伴 梦境
  - 陪伴 梦境碎片
  - 陪伴 画像
  - 陪伴 日记
  - 陪伴 生成日记
  - 陪伴 查看提示词 日程|细化|主动|回复注入
  - 陪伴 完整测试
  - 陪伴 结束完整测试
  - 陪伴模拟唤醒 <想模拟的用户消息>
  - 陪伴 日期列表
  - 陪伴 日期添加 <标题> <YYYY-MM-DD或MM-DD> [备注]
  - 陪伴 日期删除 <标题关键词>
  - 陪伴 可以 <Bot 能做的事>
  - 陪伴 不能 <不希望 Bot 做的事>
  - 陪伴 可做事项
  - 陪伴 昵称 <称呼>
  - 陪伴 语气 温柔|活泼|工作
  - 陪伴 清空记忆

  配置页 target_user_ids 会自动开启主动私聊；插件遵守每日上限、最小间隔和免打扰时间。看屏幕、生图、戳一戳、语音等联动能力都是可选项,缺失时会自动跳过并回退为普通文本主动消息。
version: 1.0.0
support_platforms:
  - aiocqhttp
astrbot_version: ">=4.22.0"
